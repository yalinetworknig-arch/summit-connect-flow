[build]
  command = "bun run build"
  publish = ".netlify/static"

[build.environment]
  NODE_VERSION = "20"
  BUN_VERSION = "1.1.0"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
