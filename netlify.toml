[build]
  command = "npm run build 2>&1; BUILD_EXIT=$?; echo '--- BUILD DONE exit='$BUILD_EXIT; ls -la .netlify/ 2>/dev/null || echo 'NO .netlify DIR'; ls -la .output/ 2>/dev/null || echo 'NO .output DIR'; exit $BUILD_EXIT"
  publish = ".netlify/static"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
