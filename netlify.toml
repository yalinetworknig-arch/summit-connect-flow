[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Serve static assets directly — do NOT redirect to function
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/icons/*"
  to = "/icons/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200
  force = true

# All page routes go to SSR function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
